<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tables</h1>

    <table border="5">
        <caption>
            <h2>School timetable</h2>
        </caption>
        <tr>
            <th>Day/period</th>
            <th>1
                <br> 9:30-10:30</th>
            <th>2 <br> 10:30-11:30</th>
            <th>3 <br> 11:30-12:30</th>
            <th rowspan="6"> <br> 12:30-13:30 <br>lunch</th>
            <th>4 <br> 13:30-14:30</th>
            <th>5 <br> 14:30-15:30</th>
            <th>6  <br> 15:30-16:30</th>
        
            
        </tr>
        <tr > 

             <td>Monday</td>
             <td>Eng</td>
             <td>Math</td>
             <td>Chem</td>
             <td colspan="2">lab</td>
             <td>Phy</td>
         </tr>
        <tr > 

             <td>Tuesday</td>
             <td colspan="3">lab</td>
             <td>Eng</td>
             <td>Chem</td>
             <td>Math</td>
            
         </tr>
        <tr > 

             <td>Wednesday</td>
             <td>Math</td>
             <td>Phy</td>
             <td>Eng</td>
             <td>Chem</td>
             <td colspan="2">LIBRARY</td>
         </tr>
        <tr > 

             <td>Thursday</td>
             <td>Phy</td>
             <td>Eng</td>
             <td>Chem</td>
             <td colspan="2">lab</td>
             <td>Math</td>
         </tr>
        <tr > 

             <td>Friday</td>
             <td>Eng</td>
             <td>Math</td>
             <td>Chem</td>
             <td colspan="2">lab</td>
             <td>Phy</td>
         </tr>
    </table>
</body>
</html>
