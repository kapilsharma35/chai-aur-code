<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navigation bar variations</title>
</head>
 <style>
   body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #c2dbdc;
    color: #fff;
}
 .nav-container {
    margin-bottom: 40px;
 }
.nav1  {
    border: 2px solid #dd7373;
    background-color: #e3e0e0;
    padding: 10px;


}
.nav1 ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
    justify-content: space-around;
} 
.nav li {
    display: inline;}
     .nav1 a {
        text-decoration: none;
        color: #333;
        background-color: #e3e0e0;
        padding: 5px 10px;
        position: relative;

    } 
    .nav1 a::after {
        content: '';
        position: absolute;
        width: 100%;
        height: 2px;
        background-color: #4c44e3;
        left: 0;
        bottom: 5px;
        transform: scaleX(0);
        transition: transform 0.3s ease;

    } 
    .nav1 a:hover::after {
        transform: scaleX(1);
        
    }
        
        
    .nav1 .login-btn {
        background-color: #4c44e3;
        color: #fff;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
    }



h2  {
    margin-bottom: 20px;
}
.nav2{
    background-color: #383838;
    width: 200px;
    padding: 20px;
    
}
.nav2 ul {
    list-style: none;
    padding: 0;
    margin: 0;
}
.nav2 li {
    margin-bottom: 15px;
    
}
.nav2 a {
    text-decoration: none;
    color: #fff;
    padding: 10px;
    display: block;
    border-radius: 5px;
    width: 100%;


}
.nav2 a:hover {
    background-color: #656262;

}
.nav2 .login-btn {
    background-color: #817ebb;
    color: #fff;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    border-radius: 5px;
}
.nav2 .login-btn:hover {
    background-color: #82bc1e;
}

.nav3 {
    background-color: #e3e0e0;
    padding: 10px;
    
}
.nav3 ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
    padding: 0;
    justify-content: space-around;
align-items: center;
}
.nav3 a {
    text-decoration: none;
    color: #2f2b2b;
    padding: 5px 10px;
    display: block;
}
.nav3 .dropdown-content {
    display: none;
   
}
.nav3 .dropdown:hover .dropdown-content {
    display: block;
    position: absolute;
    background-color: #c0a6a6;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

</style>

<body>
    <div class="nav-container">
<h2>variations 1: horizontal eith underline effects</h2>
<nav class="nav1">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
        <li><button class="login-btn">Login</button></li>
    </ul>
</nav>
    </div>
    
 <div class="nav-container">
<h2>variations 2: vertical with hover effects</h2>
  <nav class="nav2">
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
        <li><button class="login-btn">Login</button></li>
    </ul>
    </nav>
    </div>




 <div class="nav-container">
<h2>variations 3: horizontal eith dropdown menus</h2>
<nav class="nav3">
    <ul>
       <li><a href="#">home</a></li>
       <li class="dropdown">
           <a href="#">About</a>
           <div class="dropdown-content">
               <a href="#">Our story</a>
               <a href="#">Team</a>
               <a href="#">Contact</a>
           </div>
       </li>
       <li><a href="#">Products</a></li>
       <li><button class="login-btn">Login</button></li>
    </ul>
</nav>
   </div>

</body>
</html>
