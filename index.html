<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        button{
            background-color: antiquewhite;
            color: blue;
            border: 2px solid rgb(140, 48, 48);
            margin: 10px; 
            border-radius: 15px;

            padding: 34px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bold;
            cursor: pointer;

        }
        p{
            font-size: 20px;
            padding: 20px;
            border-radius: 15px;
            text-decoration: underline;
            background-color: lightgray;
            color: blueviolet;
        }
    </style>
</head>
<body> 
    <p style="text-decoration: underline; background-color: lightgray; color: blueviolet;">This is a CSS class </p>
    <button style="background-color: antiquewhite; color: blue;">Click me</button>
    <button style="background-color: antiquewhite; color: blue;">Click me</button>
    <button>submit</button>
</body>
</html>
